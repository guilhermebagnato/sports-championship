version: '3.9'

services:
  # ============================================
  # PostgreSQL Database
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: sports-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sports_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sports_pass}
      POSTGRES_DB: ${POSTGRES_DB:-sports_championship}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sports_user} -d ${POSTGRES_DB:-sports_championship}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sports-network
    restart: unless-stopped

  # ============================================
  # Backend (FastAPI)
  # ============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sports-backend
    environment:
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-sports_user}:${POSTGRES_PASSWORD:-sports_pass}@postgres:5432/${POSTGRES_DB:-sports_championship}
      
      # JWT & Security
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      
      # API
      API_TITLE: "Sports Championship API"
      API_VERSION: "1.0.0"
      DEBUG: ${DEBUG:-False}
      
      # CORS
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost,http://localhost:80}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /app/.venv
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - sports-network
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ============================================
  # Frontend (Vite Dev Server)
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sports-frontend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000/api}
      NODE_ENV: development
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5173/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - sports-network
    restart: unless-stopped

  # ============================================
  # Optional: pgAdmin (Database UI)
  # ============================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: sports-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      - postgres
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - sports-network
    restart: unless-stopped
    profiles:
      - debug

networks:
  sports-network:
    driver: bridge

volumes:
  postgres_data:
  pgadmin_data:
